<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <header class="hotel-header">
    <h1><i class="fa-solid fa-hotel"></i> The Manhattan</h1>
    <p>Luxury Hotel Booking System</p>
</header>


    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>The Manhattan New York</h1>

    <nav>
        <button onclick="showSection('rooms')">Rooms</button>
        <button onclick="showSection('guests')">Guests</button>
        <button onclick="showSection('bookings')">Bookings</button>
    </nav>

    <!-- Rooms Section -->
    <section id="rooms-section">
        <h2>Rooms</h2>
        <form id="room-form">
            <input type="text" id="room-number" placeholder="Room Number" required>
            <select id="room-type" required>
                <option value="">Select Type</option>
                <option value="single">Single</option>
                <option value="double">Double</option>
                <option value="suite">Suite</option>
            </select>
            <input type="number" id="room-price" placeholder="Price/Night" required>
            <input type="number" id="room-capacity" placeholder="Capacity" required>
            <button type="submit">Add Room</button>
        </form>
        <div id="rooms-list"></div>
    </section>

    <!-- Guests Section -->
    <section id="guests-section" style="display:none;">
        <h2>Guests</h2>
        <form id="guest-form">
            <input type="text" id="guest-name" placeholder="Full Name" required>
            <input type="email" id="guest-email" placeholder="Email" required>
            <input type="tel" id="guest-phone" placeholder="Phone" required>
            <button type="submit">Add Guest</button>
        </form>
        <div id="guests-list"></div>
    </section>

    <!-- Bookings Section -->
    <section id="bookings-section" style="display:none;">
        <h2>Bookings</h2>
        <form id="booking-form">
            <select id="booking-guest" required></select>
            <select id="booking-room" required></select>
            <input type="date" id="booking-checkin" required>
            <input type="date" id="booking-checkout" required>
            <button type="submit">Create Booking</button>
        </form>
        <div id="bookings-list"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
